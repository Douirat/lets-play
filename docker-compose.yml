services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    command: ["mongod", "--quiet"]
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  app:
    build: .
    container_name: lets-play
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  mongodb_data: